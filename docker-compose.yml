services:
  strapi:
    container_name: strapi
    image: ghcr.io/mega61/golden-beauty-studio-crm:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres-transversal
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Public marketing CMS — media on GCS + watermark + CORS.
      # See docs/GCP-CLOUDFLARE-SETUP.md. Define these in Portainer's stack env.
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GCS_BASE_URL: ${GCS_BASE_URL}
      GCS_SERVICE_ACCOUNT: ${GCS_SERVICE_ACCOUNT}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MEDIA_CSP_ORIGINS: ${MEDIA_CSP_ORIGINS}
      WATERMARK_FOLDER: ${WATERMARK_FOLDER}
      WATERMARK_EXCLUDE_FOLDERS: ${WATERMARK_EXCLUDE_FOLDERS}
    networks:
      - web
      - data

networks:
  web:
    external: true
  data:
    external: true
